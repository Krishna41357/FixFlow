
services:
  # ===== MONGODB =====
  mongodb:
    image: mongo:7.0
    container_name: pipeline_autopsy_db
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: rag_database        # âœ… fixed: matches hardcoded db name
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pipeline_autopsy_network

  # ===== BACKEND =====
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: pipeline_autopsy_api
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      # openmetadata-server:
      #   condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # âœ… fixed: no auth + correct db name
      MONGO_URI: mongodb://mongodb:27017/rag_database

      # Auth
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-change-this-in-production-12345678}
      ACCESS_TOKEN_EXPIRE_MINUTES: 30

      # âœ… fixed: points to compose service name
      OPENMETADATA_URL: http://openmetadata-server:8585
      OPENMETADATA_API_KEY: ${OPENMETADATA_API_KEY}

      # LLM â€” groq is your only real key
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-demo}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-sk-ant-demo}
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-groq}  # âœ… groq since that key looks real
      AI_MODEL: llama-3.3-70b-versatile

      # GitHub
      GITHUB_APP_ID: ${GITHUB_APP_ID:-123456}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-demo-secret}
      GITHUB_TEST_PAT: ${GITHUB_TEST_PAT:-}

      # API
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost:5173"]'
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DEBUG: ${DEBUG:-true}

    # âœ… removed volume mount so Docker build is actually used
    networks:
      - pipeline_autopsy_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ===== OPENMETADATA DEPENDENCIES =====
  postgresql:
    image: postgres:13
    container_name: pipeline_autopsy_postgres
    environment:
      POSTGRES_USER: openmetadata_user
      POSTGRES_PASSWORD: openmetadata_password
      POSTGRES_DB: openmetadata_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openmetadata_user -d openmetadata_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pipeline_autopsy_network

  elasticsearch:
    image: elasticsearch:8.10.2
    container_name: pipeline_autopsy_es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - pipeline_autopsy_network

  # Add this service to your docker-compose.yml
# Place it BEFORE openmetadata-server

  openmetadata-migrate:
    image: openmetadata/server:1.3.1
    container_name: pipeline_autopsy_migrate
    command: "./bootstrap/bootstrap_storage.sh migrate-all"
    environment:
      - DB_DRIVER_CLASS=org.postgresql.Driver
      - DB_SCHEME=postgresql
      - DB_HOST=postgresql
      - DB_PORT=5432
      - DB_USER=openmetadata_user
      - DB_USER_PASSWORD=openmetadata_password
      - OM_DATABASE=openmetadata_db
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - pipeline_autopsy_network
    restart: "no"    # run once and exit

  # ===== OPENMETADATA SERVER =====
  openmetadata-server:
    image: openmetadata/server:1.3.1
    container_name: pipeline_autopsy_openmetadata
    ports:
      - "8585:8585"
    environment:
      - OPENMETADATA_CLUSTER_NAME=openmetadata
      - DB_DRIVER_CLASS=org.postgresql.Driver
      - DB_SCHEME=postgresql
      - DB_HOST=postgresql
      - DB_PORT=5432
      - DB_USER=openmetadata_user
      - DB_USER_PASSWORD=openmetadata_password
      - OM_DATABASE=openmetadata_db
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
    depends_on:
      postgresql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      openmetadata-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl", "-f", "http://localhost:8585/api/v1/system/status || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 180s        # OpenMetadata takes ~2 mins to boot
    networks:
      - pipeline_autopsy_network
    restart: unless-stopped

  # ===== FRONTEND =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pipeline_autopsy_ui
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
    networks:
      - pipeline_autopsy_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  pipeline_autopsy_network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  postgres_data:
    driver: local
  elasticsearch_data:
    driver: local
